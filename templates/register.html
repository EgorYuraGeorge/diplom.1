{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <h1 class="form-title">Регистрация</h1>
        
        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label for="username">Имя пользователя:</label>
                <input type="text" id="username" name="username" class="form-control" required 
                       placeholder="Придумайте имя пользователя">
            </div>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" class="form-control" required 
                       placeholder="Введите ваш email">
            </div>
            
            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" id="password" name="password" class="form-control" required 
                       placeholder="Придумайте пароль">
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Подтвердите пароль:</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" required 
                       placeholder="Повторите пароль">
            </div>
            
            <!-- Роль больше не выбирается пользователем. Все регистрируются как ученики.
                 Учитель создаётся только через init_db.py -->
            <input type="hidden" name="role" value="student">
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                Зарегистрироваться
            </button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem;">
            Уже есть аккаунт? <a href="{{ url_for('login') }}" style="color: var(--primary); text-decoration: none;">
            Войдите в систему</a>
        </p>
        
        <div class="info-note" style="margin-top: 20px; padding: 12px; background: #f0fdf4; border-radius: 12px; text-align: center;">
            <p style="margin: 0; font-size: 0.8rem; color: #166534;">
                🔒 Все пользователи регистрируются как ученики.<br>
                Учитель уже создан: <strong>teacher / teacher123</strong>
            </p>
        </div>
    </div>
</div>

<style>
/* Дополнительные стили для страницы регистрации */
.form-container {
    min-height: calc(100vh - 200px);
    display: flex;
    align-items: center;
    justify-content: center;
}

.info-note {
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
}

[data-theme="dark"] .info-note {
    background: #1a2e1a;
    border-color: #2e4a2e;
    color: #86efac;
}

[data-theme="dark"] .info-note p {
    color: #86efac;
}
</style>
{% endblock %}
