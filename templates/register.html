<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Школа Химии и Биологии</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="header">
        <nav class="nav container">
            <a href="{{ url_for('index') }}" class="logo">
                <span class="logo-icon">🔬</span>
                Химия & Биология
            </a>
            <div class="nav-links">
                <a href="{{ url_for('index') }}">← На главную</a>
                <a href="{{ url_for('login') }}">Войти</a>
            </div>
        </nav>
    </header>

    <main>
        <div class="form-container">
            <div class="form-card">
                <h1 class="form-title">Регистрация</h1>
                
                <!-- ФОРМА С method="POST" -->
                <form method="POST" action="{{ url_for('register') }}">
                    <div class="form-group">
                        <label for="username">Имя пользователя:</label>
                        <input type="text" id="username" name="username" class="form-control" required 
                               placeholder="Придумайте имя пользователя">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" class="form-control" required 
                               placeholder="Введите ваш email">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Пароль:</label>
                        <input type="password" id="password" name="password" class="form-control" required 
                               placeholder="Придумайте пароль">
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm_password">Подтвердите пароль:</label>
                        <input type="password" id="confirm_password" name="confirm_password" class="form-control" required 
                               placeholder="Повторите пароль">
                    </div>
                    
                    <div class="form-group">
                        <label for="role">Роль:</label>
                        <select id="role" name="role" class="form-control" required>
                            <option value="">Выберите роль</option>
                            <option value="student">Ученик</option>
                            <option value="teacher">Учитель</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        Зарегистрироваться
                    </button>
                </form>
                
                <p style="text-align: center; margin-top: 1.5rem;">
                    Уже есть аккаунт? <a href="{{ url_for('login') }}" style="color: var(--primary); text-decoration: none;">
                    Войдите в систему</a>
                </p>

                <!-- Сообщения об ошибках -->
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div style="background: #fee; padding: 1rem; border-radius: 8px; margin-top: 1rem;">
                            {% for message in messages %}
                                <p style="color: #c53030; margin: 0;">{{ message }}</p>
                            {% endfor %}
                        </div>
                    {% endif %}
                {% endwith %}
            </div>
        </div>
    </main>
<!-- ПРОСТОЙ СКРИПТ ДЛЯ ПРОВЕРКИ ПАРОЛЕЙ (опционально) -->
    <script>
        document.getElementById('confirm_password')?.addEventListener('input', function() {
            const password = document.getElementById('password').value;
            const confirmPassword = this.value;
            
            if (password !== confirmPassword && confirmPassword !== '') {
                this.style.borderColor = '#ef4444';
            } else {
                this.style.borderColor = '#10b981';
            }
        });
    </script>
</body>
</html>
