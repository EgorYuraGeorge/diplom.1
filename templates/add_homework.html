{% extends "base.html" %}

{% block content %}
<div class="animate-fade-in-up">
    <div class="container-narrow">
        <div class="text-center mb-8">
            <h1 class="hero-title" style="font-size: 2.5rem; margin-bottom: 1rem;">
                📝 Создать задание
            </h1>
            <p class="text-secondary" style="font-size: 1.1rem;">
                Добавьте новое домашнее задание для ваших учеников
            </p>
        </div>

        <div class="card" style="max-width: 700px; margin: 0 auto;">
            <form method="POST" action="{{ url_for('add_homework') }}" enctype="multipart/form-data">
                <div class="form-group">
                    <label class="form-label">📌 Название задания</label>
                    <input type="text" name="title" class="form-control" placeholder="Введите название задания" required style="font-size: 1rem; padding: 1rem;">
                </div>

                <div class="grid gap-6" style="grid-template-columns: 1fr 1fr;">
                    <div class="form-group">
                        <label class="form-label">📚 Предмет</label>
                        <select name="subject" class="form-control" required style="font-size: 1rem; padding: 1rem;">
                            <option value="">Выберите предмет</option>
                            <option value="chemistry">🧪 Химия</option>
                            <option value="biology">🔬 Биология</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">⭐ Макс. балл</label>
                        <input type="number" name="max_points" class="form-control" value="100" min="1" max="1000" style="font-size: 1rem; padding: 1rem;">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">📅 Дедлайн (опционально)</label>
                    <input type="date" name="deadline" class="form-control" style="font-size: 1rem; padding: 1rem;">
                    <small class="text-tertiary" style="display: block; margin-top: 0.5rem;">
                        Если не установить, задание будет без дедлайна
                    </small>
                </div>

                <div class="form-group">
                    <label class="form-label">⏰ Авто-удаление задания</label>
                    <select name="auto_delete" class="form-control" style="font-size: 1rem; padding: 1rem;">
                        <option value="">Никогда не удалять</option>
                        <option value="1">Через 1 день</option>
                        <option value="3">Через 3 дня</option>
                        <option value="7">Через 1 неделю</option>
                        <option value="14">Через 2 недели</option>
                        <option value="30">Через 1 месяц</option>
                    </select>
                    <small class="text-tertiary" style="display: block; margin-top: 0.5rem;">
                        Задание автоматически удалится после выбранного срока
                    </small>
                </div>

                <div class="form-group">
                    <label class="form-label">📄 Описание задания</label>
                    <textarea name="description" class="form-control" rows="6" placeholder="Опишите задание подробно..." required style="font-size: 1rem; padding: 1rem; resize: vertical;"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">📎 Прикрепить файл (опционально)</label>
                    <input type="file" name="homework_file" class="form-control" style="font-size: 1rem; padding: 1rem; border: 2px dashed #e2e8f0;">
                    <small class="text-tertiary" style="display: block; margin-top: 0.5rem;">
                        Поддерживаемые форматы: PDF, DOC, DOCX, TXT, ZIP, RAR
                    </small>
                </div>

                <div class="flex gap-4 mt-8">
                    <button type="submit" class="btn btn-primary flex-1" style="padding: 1rem 2rem; font-size: 1.1rem;">
                        ✅ Создать задание
                    </button>
                    <a href="{{ url_for('homeworks') }}" class="btn btn-secondary" style="padding: 1rem 1.5rem;">
                        ← Назад
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
