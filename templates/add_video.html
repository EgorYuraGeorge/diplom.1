{% extends "base.html" %}

{% block content %}
<div class="animate-fade-in-up">
    <div class="container-narrow">
        <div class="text-center mb-8">
            <h1 class="hero-title" style="font-size: 2.5rem; margin-bottom: 1rem;">
                🎥 Добавить видеоурок
            </h1>
            <p class="text-secondary" style="font-size: 1.1rem;">
                Загрузите видеофайл или укажите ссылку на YouTube
            </p>
        </div>

        <div class="card" style="max-width: 700px; margin: 0 auto;">
            <form method="POST" action="{{ url_for('add_video') }}" enctype="multipart/form-data">
                <div class="form-group">
                    <label class="form-label">📝 Название видео</label>
                    <input type="text" name="title" class="form-control" placeholder="Введите название видеоурока" required style="font-size: 1rem; padding: 1rem;">
                </div>

                <div class="form-group">
                    <label class="form-label">📁 Способ добавления</label>
                    <div class="grid gap-4" style="grid-template-columns: 1fr 1fr;">
                        <div>
                            <input type="radio" id="upload_file" name="input_method" value="upload" checked onclick="toggleVideoInput()">
                            <label for="upload_file" style="margin-left: 0.5rem;">📤 Загрузить файл</label>
                        </div>
                        <div>
                            <input type="radio" id="use_link" name="input_method" value="link" onclick="toggleVideoInput()">
                            <label for="use_link" style="margin-left: 0.5rem;">🔗 Использовать ссылку</label>
                        </div>
                    </div>
                </div>

                <div class="form-group" id="file_upload_section">
                    <label class="form-label">📹 Видеофайл</label>
                    <input type="file" name="video_file" class="form-control" accept=".mp4,.mov,.avi,.mkv,.webm" style="font-size: 1rem; padding: 1rem; border: 2px dashed var(--border-light);">
                    <small class="text-tertiary" style="display: block; margin-top: 0.5rem;">
                        Поддерживаемые форматы: MP4, MOV, AVI, MKV, WebM (макс. 500MB)
                    </small>
                </div>

                <div class="form-group" id="link_section" style="display: none;">
                    <label class="form-label">🔗 Ссылка на видео</label>
                    <input type="url" name="video_url" class="form-control" placeholder="https://www.youtube.com/watch?v=..." style="font-size: 1rem; padding: 1rem;">
                    <small class="text-tertiary" style="display: block; margin-top: 0.5rem;">
                        YouTube: https://www.youtube.com/watch?v=CODE
                    </small>
                </div>

                <div class="form-group">
                    <label class="form-label">📚 Предмет</label>
                    <select name="subject" class="form-control" required style="font-size: 1rem; padding: 1rem;">
                        <option value="">Выберите предмет</option>
                        <option value="chemistry">🧪 Химия</option>
                        <option value="biology">🔬 Биология</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">📄 Описание видео</label>
                    <textarea name="description" class="form-control" rows="4" placeholder="Опишите содержание видеоурока..." style="font-size: 1rem; padding: 1rem;"></textarea>
                </div>

                <input type="hidden" name="video_type" id="video_type" value="uploaded">

                <div class="flex gap-4 mt-8">
                    <button type="submit" class="btn btn-primary flex-1" style="padding: 1rem 2rem; font-size: 1.1rem;">
                        🎬 Добавить видеоурок
                    </button>
                    <a href="{{ url_for('videos') }}" class="btn btn-secondary" style="padding: 1rem 1.5rem;">
                        ← Назад
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function toggleVideoInput() {
        const fileSection = document.getElementById('file_upload_section');
        const linkSection = document.getElementById('link_section');
        const uploadFileRadio = document.getElementById('upload_file');
        const videoTypeInput = document.getElementById('video_type');
        
        if (uploadFileRadio.checked) {
            fileSection.style.display = 'block';
            linkSection.style.display = 'none';
            videoTypeInput.value = 'uploaded';
        } else {
            fileSection.style.display = 'none';
            linkSection.style.display = 'block';
            videoTypeInput.value = 'youtube';
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        toggleVideoInput();
    });
</script>
{% endblock %}
